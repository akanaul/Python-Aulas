name: 🤖 Avaliador Automatizado de Pull Requests (IA + Tutor)

on:
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

jobs:
  avalia_pr_aluno:
    name: 🧪 Executar Suíte de Testes & Pré-Aprovação de IA
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧪 Executar Avaliador Automatizado nos Exercícios do Aluno
        id: run_evaluator
        continue-on-error: true
        run: |
          python avaliar_exercicio.py --all

      - name: 💬 Comentar Pré-Aprovação da IA (Testes Passaram)
        if: steps.run_evaluator.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🤖 Avaliação Automatizada de IA — Copiloto Tutor\n\n🎉 ✅ **STATUS: PRÉ-APROVADO PELA IA! (REVISÃO 1 DE 2 OK)**\n\nParabéns! Sua solução passou em **100% dos testes automatizados dos exercícios (\`*_manual.py\`)**.\n\n📌 **Próxima Etapa (Revisão 2 - Professor/Tutor Humano):**\nO Tutor/Professor **@akanaul** foi notificado e fará a revisão técnica do seu código para aprovar o **Merge** oficial no repositório principal!`
            });
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['pre-aprovado-ia', 'pronto-para-merge']
            });

      - name: 💬 Comentar Diagnóstico de Erro (Testes Falharam)
        if: steps.run_evaluator.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### 🤖 Avaliação Automatizada de IA — Copiloto Tutor\n\n⚠️ ❌ **STATUS: RECUSADO PELA IA — AJUSTES NECESSÁRIOS**\n\nSeu código nos exercícios \`*_manual.py\` ainda não passou em todos os testes automatizados.\n\n💡 **O que fazer:**\n1. Verifique os logs de teste da execução do GitHub Actions acima para identificar a falha.\n2. Lembre-se: use o Antigravity / IA no **Modo Tutor** para tirar dúvidas de lógica sem pedir a resposta pronta.\n3. Faça as correções no arquivo \`*_manual.py\`, faça \`git commit\` e \`git push\` para atualizar este Pull Request!`
            });
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['ajustes-necessarios']
            });

      - name: 🚨 Falhar Job se Testes Falharem
        if: steps.run_evaluator.outcome != 'success'
        run: exit 1
